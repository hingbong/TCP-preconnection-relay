name: Build relay (amd64)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        target:
          - cpu: x86-64-v2
            features: +sse3,+ssse3,+sse4.1,+sse4.2,+popcnt
            suffix: amd64-v2
          - cpu: x86-64-v3
            features: +avx,+avx2,+bmi1,+bmi2,+f16c,+fma,+lzcnt,+movbe,+sse3,+ssse3,+sse4.1,+sse4.2,+popcnt
            suffix: amd64-v3

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            relay-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target.suffix }}-${{ hashFiles('relay-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target.suffix }}-

      - name: Build relay
        working-directory: relay-rs
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.target.cpu }} -C target-feature=${{ matrix.target.features }}"
        run: |
          cargo build --release --target x86_64-unknown-linux-musl
          # Strip and rename
          strip target/x86_64-unknown-linux-musl/release/relay
          cp target/x86_64-unknown-linux-musl/release/relay ../relay-${{ matrix.target.suffix }}

      - name: Check binary
        run: |
          file relay-${{ matrix.target.suffix }}
          ls -lh relay-${{ matrix.target.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.target.suffix }}
          path: relay-${{ matrix.target.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/relay-*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-manual:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          tag: builds
          name: Custom Builds - Latest
          body: |
            **Latest manual build**

            - **Targets**: amd64-v2, amd64-v3
            - **Commit**: ${{ github.sha }}
            - **Build Time**: ${{ github.event.repository.updated_at }}

            ---

            💡 This release is automatically updated with the latest builds.
          artifacts: artifacts/relay-*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
